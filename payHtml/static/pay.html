<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"
    />
    <link rel="stylesheet" type="text/css" href="../static/css/common.css" />
    <link rel="stylesheet" type="text/css" href="../static/css/pay.css" />
    <title>Pay</title>
  </head>
  <body style="font-size: 16px">
    <div id="PayChoose">
      <div class="top"></div>
      <div class="main" style="height: 16.2rem">
        <div stlye="height: 16.2rem;overflow: scroll;">
          <div class="amount">&#8377;<span class="payMoney">100.00</span></div>
          <div class="pay-desc">
            The amount you need to pay
            <div class="wait2">
              <div class="time"></div>
            </div>
          </div>
          <div class="pay-select">Please select the options to pay</div>
          <div class="pay-type">
            <ul>
              <li data="phonepe" class="">
                <img src="../static/img/phonepe.png" />
                <span>Phonepe</span>
                <div class="circle"></div>
              </li>
              <li data="gpay" class="">
                <img src="../static/img/gpay.png" />
                <span>GooglePay</span>
                <div class="circle"></div>
              </li>
              <li data="paytmmp" class="check">
                <img src="../static/img/paytm.png" />
                <span>PayTm</span>
                <div class="circle"></div>
              </li>
              <li data="mobikwik" class="">
                <img src="../static/img/mobikwik.png" />
                <span>Mobikwik</span>
                <div class="circle"></div>
              </li>
              <li data="bhim" class="">
                <img src="../static/img/bhim.png" />
                <span>BHIM</span>
                <div class="circle"></div>
              </li>
              <li data="upi">
                <img src="../static/img/other.png" />
                <span>Other UPI</span>
                <div class="circle"></div>
              </li>
            </ul>
          </div>
        </div>
        <div
          id="payButton"
          class="pay-button"
          style="
            right: 0.37rem;
            position: fixed;
            left: 0;
            bottom: 0;
            display: none;
          "
        >
          Pay<span>&#8377;<span class="payMoney">0.00</span></span>
        </div>
        <div style="margin-top: 2rem" class="footer-copyright">
          &#169;2020-2024 Payou.All rights reserved
        </div>
      </div>
      <!-- loading -->
      <div class="loading_div" id="loading">
        <div class="load">
          <hr />
          <hr />
          <hr />
          <hr />
        </div>
      </div>
    </div>
    <div id="PayResult"></div>
    <script type="text/javascript" src="../static/js/rem.js"></script>
    <script
      type="text/javascript"
      src="../static/js/jquery-3.6.0.min.js"
    ></script>
    <script
      type="text/javascript"
      src="../static/js/jquery-migrate-1.4.1.min.js"
    ></script>
    <script type="text/javascript" src="../static/js/pay.js"></script>
    <script type="text/javascript">
      function toast(msg, duration) {
        duration = isNaN(duration) ? 3000 : duration;
        var m = document.createElement("div");
        m.innerHTML = msg;
        m.style.cssText =
          "padding:0.06rem; background:#000000; opacity:0.72; color:#FFFFFF; text-align:center; border-radius:0.2rem; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); -webkit-transform:translate(-50%,-50%); z-index:999; font-size: 0.3rem; min-width:50%; max-width: 70%;";
        document.body.appendChild(m);
        setTimeout(function () {
          var d = 0.5;
          m.style.webkitTransition =
            "-webkit-transform " + d + "s ease-in, opacity " + d + "s ease-in";
          m.style.opacity = "0";
          setTimeout(function () {
            document.body.removeChild(m);
          }, d * 1000);
        }, duration);
      }
    </script>
  </body>
  <style>
    #PayResult {
      margin: 0.1rem;
      font-size: 20px;
    }
    #PayResult .title {
      width: 100%;
      position: relative;
      background-color: #06a640;
      line-height: 1.5rem;
      text-align: center;
      border-bottom: 1px solid#ddd;
    }
    #PayResult .title-txt {
      color: white;
      font-weight: 800;
    }
    #PayResult .content {
      height: 5rem;
      margin-top: 0.3rem;
      position: relative;
      border: 1px solid#e5e5e5;
      text-align: center;
    }
    #PayResult .content-txt {
      color: #333;
      text-align: center;
    }
    .loading_div {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.8);
      z-index: 999;
      /* display: none; */
    }

    .load {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /*change these sizes to fit into your project*/
      width: 1rem;
      height: 1rem;
    }
    .load hr {
      border: 0;
      margin: 0;
      width: 40%;
      height: 40%;
      position: absolute;
      border-radius: 50%;
      animation: spin 2s ease infinite;
    }

    .load :first-child {
      background: #19a68c;
      animation-delay: -1.5s;
    }
    .load :nth-child(2) {
      background: #f63d3a;
      animation-delay: -1s;
    }
    .load :nth-child(3) {
      background: #fda543;
      animation-delay: -0.5s;
    }
    .load :last-child {
      background: #beedff;
    }

    @keyframes spin {
      0%,
      100% {
        transform: translate(0);
      }
      25% {
        transform: translate(160%);
      }
      50% {
        transform: translate(160%, 160%);
      }
      75% {
        transform: translate(0, 160%);
      }
    }
  </style>
</html>
