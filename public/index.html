<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link rel="icon" href="<%= process.env.BASE_URL %>bitbug_favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Londrina+Sketch&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="/Resources/js/jquery.min.js"></script>
    <title><%= webpackConfig.name %></title>
    <link rel="stylesheet" href="/Resources/css/loading.css" />
    <!--[if lt IE 11
      ]><script>
        window.location.href = "/html/ie.html";
      </script><!
    [endif]-->
    <script></script>
    <style>
      /* 定义渐隐效果 */
      .fade-out {
        opacity: 1;
        transition: all 1s ease-out; /* 渐隐效果持续 1 秒 */
      }

      .fade-out.fade-out-hidden {
        opacity: 0;
        /* top: 100%; */
        /* left: 100%; */
        /* width: 0; */
        /* height: 0; */
      }

      /* 当元素 opacity 为 0 且完全隐藏后，可以通过 display:none 删除它 */
      .remove {
        display: none !important;
      }
      .show {
        display: block;
      }
      html,
      body,
      #app {
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
      .chromeframe {
        margin: 0.2em 0;
        background: #ccc;
        color: #000;
        padding: 0.2em 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- id="loader-wrapper" -->
    </div>
    <% if (process.env.VUE_APP_SHOW_LOADING === 'true') { %>
    <div id="loader-wrapper" class="fade-out loading-container">
      <!-- Logo区域 -->
      <div class="logo-box">
        <!-- 这里可以替换成你的logo图片 -->
        <img
          src="/Resources/image/default.png"
          alt="logo"
          class="loading_logo"
        />
      </div>

      <!-- Loading 动画 -->
      <div class="spinner">
        <div class="spinner-dot"></div>
      </div>
    </div>
    <% } %>
  </body>
</html>
